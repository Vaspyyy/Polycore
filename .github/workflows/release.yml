name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: polycore-linux-x86_64
            binary: polycore
          - os: windows-latest
            artifact: polycore-windows-x86_64
            binary: polycore.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - run: cargo build --release
      - name: Stage archive
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"
          cp -r config README.md LICENSE.md "dist/${{ matrix.artifact }}/"
      - name: Create archive
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "dist/${{ matrix.artifact }}.zip" "./dist/${{ matrix.artifact }}/*"
          else
            tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
